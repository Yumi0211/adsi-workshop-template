spring:
  application:
    name: attendance
  datasource:
    url: jdbc:postgresql://localhost:5432/attendance
    username: ${DB_USERNAME:attendance}
    password: ${DB_PASSWORD:attendance}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          azure:
            client-id: ${AZURE_CLIENT_ID:dummy}
            client-secret: ${AZURE_CLIENT_SECRET:dummy}
            scope: openid,profile,email
        provider:
          azure:
            issuer-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID:common}/v2.0

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
